<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registro de Clientes - loligo spa</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#ffffff",
                        "on-secondary-container": "#6b4b00",
                        "background": "#f6faff",
                        "surface-tint": "#00677d",
                        "on-surface": "#001e2f",
                        "on-tertiary-container": "#452000",
                        "secondary-container": "#ffb702",
                        "primary-fixed-dim": "#69d4f4",
                        "on-tertiary-fixed": "#301400",
                        "on-background": "#001e2f",
                        "surface-container-low": "#ebf5ff",
                        "on-surface-variant": "#3e484d",
                        "surface": "#f6faff",
                        "primary-fixed": "#b2ebff",
                        "on-secondary-fixed": "#271900",
                        "surface-variant": "#c8e6ff",
                        "on-primary-fixed": "#001f27",
                        "secondary-fixed": "#ffdea9",
                        "tertiary-fixed": "#ffdcc4",
                        "on-primary-container": "#002f3a",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#f6faff",
                        "surface-container-high": "#d4ebff",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#c8e6ff",
                        "inverse-on-surface": "#e5f2ff",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#ffb781",
                        "surface-dim": "#b9dffc",
                        "on-error-container": "#93000a",
                        "primary": "#00677d",
                        "secondary": "#7d5800",
                        "on-primary-fixed-variant": "#004e5f",
                        "on-error": "#ffffff",
                        "tertiary-container": "#df7500",
                        "primary-container": "#219ebc",
                        "inverse-surface": "#07344b",
                        "outline-variant": "#bdc8cd",
                        "on-secondary-fixed-variant": "#5e4100",
                        "outline": "#6e797d",
                        "inverse-primary": "#69d4f4",
                        "tertiary": "#934b00",
                        "secondary-fixed-dim": "#ffba27",
                        "on-tertiary-fixed-variant": "#703800",
                        "on-primary": "#ffffff",
                        "surface-container": "#e0f0ff",
                        "on-tertiary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-gap": "16px",
                        "margin-mobile": "16px",
                        "gutter": "24px",
                        "container-max": "1280px",
                        "card-padding": "24px",
                        "margin-desktop": "32px"
                    },
                    "fontFamily": {
                        "headline-md": ["Hanken Grotesk"],
                        "headline-md-mobile": ["Hanken Grotesk"],
                        "label-md": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "data-tabular": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"],
                        "title-sm": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "headline-md-mobile": ["20px", { "lineHeight": "28px", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "data-tabular": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "title-sm": ["18px", { "lineHeight": "24px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Hanken Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-4 md:p-margin-desktop">
<div class="w-full max-w-[800px] bg-surface-container-lowest rounded-xl shadow-[0px_4px_12px_rgba(0,0,0,0.05)] overflow-hidden">
<!-- Header Section -->
<div class="bg-primary-container text-on-primary px-8 py-10 text-center md:text-left relative overflow-hidden">
<!-- Decorative background pattern (simulated with CSS gradients) -->
<div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(circle at 2px 2px, white 1px, transparent 0); background-size: 24px 24px;"></div>
<div class="relative z-10">
<h1 class="font-display-lg text-display-lg mb-2">loligo spa</h1>
<p class="font-body-md text-body-md opacity-90">Registrate para acumular visitas y beneficios</p>
</div>
</div>
<!-- Form Section -->
<form class="p-card-padding md:p-8 space-y-stack-gap">
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-gap">
<!-- Nombre -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="nombre">Nombre</label>
<input class="w-full h-12 px-4 rounded-lg border border-outline-variant focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all outline-none font-body-md text-body-md text-on-surface bg-surface placeholder:text-on-surface/40" id="nombre" name="nombre" placeholder="Tu nombre" type="text"/>
</div>
<!-- Apellido -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="apellido">Apellido</label>
<input class="w-full h-12 px-4 rounded-lg border border-outline-variant focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all outline-none font-body-md text-body-md text-on-surface bg-surface placeholder:text-on-surface/40" id="apellido" name="apellido" placeholder="Tu apellido" type="text"/>
</div>
</div>
<!-- Email -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="email">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant" data-icon="mail">mail</span>
</div>
<input class="w-full h-12 pl-10 pr-4 rounded-lg border border-outline-variant focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all outline-none font-body-md text-body-md text-on-surface bg-surface placeholder:text-on-surface/40" id="email" name="email" placeholder="correo@ejemplo.com" type="email"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-gap">
<!-- Telefono -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="telefono">Telefono</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant" data-icon="phone">phone</span>
</div>
<input class="w-full h-12 pl-10 pr-4 rounded-lg border border-outline-variant focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all outline-none font-body-md text-body-md text-on-surface bg-surface placeholder:text-on-surface/40" id="telefono" name="telefono" placeholder="+56" type="tel"/>
</div>
</div>
<!-- Fecha de nacimiento -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="fecha_nacimiento">Fecha de nacimiento</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg border border-outline-variant focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all outline-none font-body-md text-body-md text-on-surface bg-surface" id="fecha_nacimiento" name="fecha_nacimiento" type="date"/>
<!-- Browsers usually add their own icon for date inputs, but we can style the container -->
</div>
</div>
</div>
<!-- System Detection & Change -->
<div class="flex items-center justify-between bg-surface-container p-4 rounded-lg mt-6">
<div class="flex items-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-primary-container" data-icon="smartphone">smartphone</span>
<p class="font-body-md text-body-md">Sistema detectado: <span class="font-bold text-on-surface">iPhone (iOS)</span></p>
</div>
<button class="px-4 py-2 text-primary font-label-md text-label-md hover:bg-surface-variant/50 rounded-lg transition-colors border border-outline-variant/30 bg-surface-container-lowest shadow-sm hover:shadow-md" type="button">
                    Cambiar
                </button>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full bg-primary-container text-on-primary font-title-sm text-title-sm py-4 px-6 rounded-lg shadow-md hover:shadow-[0px_8px_20px_rgba(0,0,0,0.08)] hover:bg-primary-container/90 transition-all flex items-center justify-center gap-2 focus:ring-2 focus:ring-offset-2 focus:ring-primary-container" type="submit">
<span>Registrarme</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<div class="text-center mt-4">
<p class="font-data-tabular text-data-tabular text-outline">Al registrarte, aceptas nuestros términos y condiciones.</p>
</div>
</form>
</div>
</body></html>
