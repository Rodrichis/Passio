<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Passio - Registrar Empresa</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#ffffff",
                        "on-secondary-container": "#6b4b00",
                        "background": "#f6faff",
                        "surface-tint": "#00677d",
                        "on-surface": "#001e2f",
                        "on-tertiary-container": "#452000",
                        "secondary-container": "#ffb702",
                        "primary-fixed-dim": "#69d4f4",
                        "on-tertiary-fixed": "#301400",
                        "on-background": "#001e2f",
                        "surface-container-low": "#ebf5ff",
                        "on-surface-variant": "#3e484d",
                        "surface": "#f6faff",
                        "primary-fixed": "#b2ebff",
                        "on-secondary-fixed": "#271900",
                        "surface-variant": "#c8e6ff",
                        "on-primary-fixed": "#001f27",
                        "secondary-fixed": "#ffdea9",
                        "tertiary-fixed": "#ffdcc4",
                        "on-primary-container": "#002f3a",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#f6faff",
                        "surface-container-high": "#d4ebff",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#c8e6ff",
                        "inverse-on-surface": "#e5f2ff",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#ffb781",
                        "surface-dim": "#b9dffc",
                        "on-error-container": "#93000a",
                        "primary": "#00677d",
                        "secondary": "#7d5800",
                        "on-primary-fixed-variant": "#004e5f",
                        "on-error": "#ffffff",
                        "tertiary-container": "#df7500",
                        "primary-container": "#219ebc",
                        "inverse-surface": "#07344b",
                        "outline-variant": "#bdc8cd",
                        "on-secondary-fixed-variant": "#5e4100",
                        "outline": "#6e797d",
                        "inverse-primary": "#69d4f4",
                        "tertiary": "#934b00",
                        "secondary-fixed-dim": "#ffba27",
                        "on-tertiary-fixed-variant": "#703800",
                        "on-primary": "#ffffff",
                        "surface-container": "#e0f0ff",
                        "on-tertiary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-gap": "16px",
                        "margin-mobile": "16px",
                        "gutter": "24px",
                        "container-max": "1280px",
                        "card-padding": "24px",
                        "margin-desktop": "32px"
                    },
                    "fontFamily": {
                        "headline-md": ["Hanken Grotesk"],
                        "headline-md-mobile": ["Hanken Grotesk"],
                        "label-md": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "data-tabular": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"],
                        "title-sm": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "headline-md-mobile": ["20px", { "lineHeight": "28px", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "data-tabular": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "title-sm": ["18px", { "lineHeight": "24px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .input-enterprise {
            @apply w-full bg-surface-container-lowest border border-outline-variant/60 rounded-lg px-4 py-3 font-body-md text-on-surface transition-all duration-200 placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container hover:border-outline;
        }
    </style>
</head>
<body class="bg-background min-h-screen flex flex-col items-center justify-center p-4 md:p-8 font-body-md text-on-background">
<!-- Branding -->
<div class="mb-8 text-center">
<h1 class="font-display-lg text-primary tracking-tight">Passio</h1>
</div>
<!-- Registration Card -->
<main class="w-full max-w-[520px] bg-surface-container-lowest rounded-xl shadow-[0px_4px_24px_rgba(0,30,47,0.06)] p-6 md:p-10 border border-outline-variant/20">
<div class="text-center mb-8">
<h2 class="font-headline-md text-on-surface mb-2">Registrar empresa</h2>
<p class="font-body-md text-on-surface-variant">Crea tu cuenta corporativa para comenzar.</p>
</div>
<form action="#" class="space-y-5" method="POST">
<!-- Full Width Fields -->
<div>
<label class="sr-only" for="companyName">Nombre de la empresa</label>
<input class="input-enterprise" id="companyName" placeholder="Nombre de la empresa" type="text"/>
</div>
<div>
<label class="sr-only" for="email">Correo electrónico</label>
<input class="input-enterprise" id="email" placeholder="Correo electrónico" type="email"/>
</div>
<div>
<label class="sr-only" for="password">Contraseña</label>
<div class="relative">
<input class="input-enterprise pr-12" id="password" placeholder="Contraseña" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Two Column Layout for shorter fields -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
<!-- Phone with prefix -->
<div class="relative flex items-center">
<label class="sr-only" for="phone">Teléfono</label>
<span class="absolute left-4 text-on-surface-variant font-body-md border-r border-outline-variant/40 pr-3">+56</span>
<input class="input-enterprise pl-16" id="phone" placeholder="Teléfono" type="tel"/>
</div>
<div>
<label class="sr-only" for="region">Selecciona región</label>
<div class="relative">
<select class="input-enterprise appearance-none bg-transparent cursor-pointer text-on-surface-variant/80" id="region">
<option disabled="" selected="" value="">Selecciona región</option>
<option value="rm">Región Metropolitana</option>
<option value="v">Valparaíso</option>
<option value="viii">Biobío</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
<div>
<label class="sr-only" for="commune">Comuna</label>
<input class="input-enterprise" id="commune" placeholder="Comuna" type="text"/>
</div>
<div>
<label class="sr-only" for="address">Dirección</label>
<input class="input-enterprise" id="address" placeholder="Dirección" type="text"/>
</div>
</div>
<!-- Actions -->
<div class="pt-6 flex flex-col gap-4">
<button class="w-full bg-primary-container text-on-primary font-title-sm py-3.5 px-6 rounded-lg hover:bg-primary-container/90 active:scale-[0.98] transition-all shadow-sm flex items-center justify-center gap-2" type="submit">
                    Registrar
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<button class="w-full bg-secondary-container text-on-secondary-container font-title-sm py-3.5 px-6 rounded-lg hover:bg-secondary-container/90 active:scale-[0.98] transition-all" type="button">
                    Ya tengo cuenta
                </button>
</div>
</form>
</main>
<!-- Decorative subtle background element -->
<div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden flex justify-center items-center opacity-40">
<div class="w-[800px] h-[800px] rounded-full bg-gradient-to-br from-surface-variant/30 to-transparent blur-3xl -translate-y-1/4"></div>
</div>
</body></html>
