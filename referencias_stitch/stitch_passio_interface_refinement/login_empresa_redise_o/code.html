<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Passio - Login Empresa</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#ffffff",
                        "on-secondary-container": "#6b4b00",
                        "background": "#f6faff",
                        "surface-tint": "#00677d",
                        "on-surface": "#001e2f",
                        "on-tertiary-container": "#452000",
                        "secondary-container": "#ffb702",
                        "primary-fixed-dim": "#69d4f4",
                        "on-tertiary-fixed": "#301400",
                        "on-background": "#001e2f",
                        "surface-container-low": "#ebf5ff",
                        "on-surface-variant": "#3e484d",
                        "surface": "#f6faff",
                        "primary-fixed": "#b2ebff",
                        "on-secondary-fixed": "#271900",
                        "surface-variant": "#c8e6ff",
                        "on-primary-fixed": "#001f27",
                        "secondary-fixed": "#ffdea9",
                        "tertiary-fixed": "#ffdcc4",
                        "on-primary-container": "#002f3a",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#f6faff",
                        "surface-container-high": "#d4ebff",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#c8e6ff",
                        "inverse-on-surface": "#e5f2ff",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#ffb781",
                        "surface-dim": "#b9dffc",
                        "on-error-container": "#93000a",
                        "primary": "#00677d",
                        "secondary": "#7d5800",
                        "on-primary-fixed-variant": "#004e5f",
                        "on-error": "#ffffff",
                        "tertiary-container": "#df7500",
                        "primary-container": "#219ebc",
                        "inverse-surface": "#07344b",
                        "outline-variant": "#bdc8cd",
                        "on-secondary-fixed-variant": "#5e4100",
                        "outline": "#6e797d",
                        "inverse-primary": "#69d4f4",
                        "tertiary": "#934b00",
                        "secondary-fixed-dim": "#ffba27",
                        "on-tertiary-fixed-variant": "#703800",
                        "on-primary": "#ffffff",
                        "surface-container": "#e0f0ff",
                        "on-tertiary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-gap": "16px",
                        "margin-mobile": "16px",
                        "gutter": "24px",
                        "container-max": "1280px",
                        "card-padding": "24px",
                        "margin-desktop": "32px"
                    },
                    "fontFamily": {
                        "headline-md": ["Hanken Grotesk"],
                        "headline-md-mobile": ["Hanken Grotesk"],
                        "label-md": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "data-tabular": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"],
                        "title-sm": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "headline-md-mobile": ["20px", { "lineHeight": "28px", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "data-tabular": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "title-sm": ["18px", { "lineHeight": "24px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .glass-card {
                @apply bg-surface-container-lowest/90 backdrop-blur-md border border-outline-variant/30 shadow-[0_8px_32px_rgba(0,0,0,0.08)];
            }
        }
    </style>
</head>
<body class="bg-background min-h-screen flex flex-col font-body-md text-on-background antialiased relative overflow-hidden">
<!-- Background Decorative Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary-fixed/20 blur-3xl -z-10"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-secondary-fixed/20 blur-3xl -z-10"></div>
<!-- Main Content Canvas (No Nav Shell per Transactional Rule) -->
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop relative z-10">
<div class="w-full max-w-[420px] flex flex-col gap-stack-gap">
<!-- Brand Anchor -->
<div class="text-center mb-6">
<h1 class="font-display-lg text-display-lg text-primary">Passio</h1>
</div>
<!-- Login Card -->
<div class="glass-card rounded-xl p-card-padding flex flex-col gap-6">
<div class="text-center">
<h2 class="font-headline-md text-headline-md text-on-surface">Login Empresa</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Bienvenido de nuevo, accede a tu panel.</p>
</div>
<form action="#" class="flex flex-col gap-stack-gap" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="email">Correo electrónico</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant">mail</span>
</div>
<input class="w-full pl-10 pr-3 py-3 border border-outline-variant/50 rounded-lg bg-surface focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-colors text-on-surface font-body-md placeholder:text-on-surface-variant/40" id="email" name="email" placeholder="ejemplo@empresa.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="password">Contraseña</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant">lock</span>
</div>
<input class="w-full pl-10 pr-3 py-3 border border-outline-variant/50 rounded-lg bg-surface focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-colors text-on-surface font-body-md placeholder:text-on-surface-variant/40" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end">
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors focus:outline-none focus:underline" href="#">
                            ¿Olvidaste tu contraseña?
                        </a>
</div>
<!-- Actions -->
<div class="flex flex-col gap-4 mt-2">
<button class="w-full bg-primary-container text-on-primary font-title-sm text-title-sm py-3 rounded-lg hover:bg-primary-container/90 focus:ring-2 focus:ring-offset-2 focus:ring-primary-fixed transition-all shadow-sm hover:shadow-md flex justify-center items-center gap-2" type="submit">
                            Iniciar sesión
                            <span class="material-symbols-outlined text-[20px]">login</span>
</button>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink-0 mx-4 text-on-surface-variant font-label-md text-label-md">o</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<a class="w-full bg-secondary-container text-on-secondary-container font-title-sm text-title-sm py-3 rounded-lg hover:bg-secondary-container/90 focus:ring-2 focus:ring-offset-2 focus:ring-secondary-fixed transition-all text-center shadow-sm hover:shadow-md flex justify-center items-center gap-2" href="#">
                            Registrar nueva empresa
                            <span class="material-symbols-outlined text-[20px]">business</span>
</a>
</div>
</form>
</div>
<!-- Footer Meta -->
<div class="text-center mt-4">
<p class="font-label-md text-label-md text-on-surface-variant/70">
                    © 2024 Passio Gestión Empresarial. Todos los derechos reservados.
                </p>
</div>
</div>
</main>
</body></html>
